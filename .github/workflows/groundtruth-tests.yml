# .github/workflows/streamlit-app.yml
name: GroundTruth Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  streamlit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - uses: streamlit/streamlit-app-action@v0.0.3
        with:
          app-path: app/main.py
          skip-smoke: true
          pytest-args: -v tests/test_groundtruth.py
