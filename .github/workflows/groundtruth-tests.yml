name: GroundTruth Tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  streamlit:
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
      GROUNDTRUTH_MODEL: gemini-3.5-flash
      LANGSMITH_TRACING: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - uses: streamlit/streamlit-app-action@v0.0.3
        with:
          app-path: app/main.py
          skip-smoke: true
          pytest-args: -v tests/test_groundtruth.py

      - name: Run live eval tests with Langfuse scores
        run: |
          pytest -v tests/test_groundtruth_live_evals_with_scores.py
